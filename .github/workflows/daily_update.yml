name: Daily Naukri Profile Update

on:
  schedule:
    - cron: '0 4 * * *'   # 4:00 AM UTC = 9:30 AM IST every day
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  update-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Kill if it hangs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install playwright python-dotenv

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # Naukri often serves no login form to true headless + datacenter IPs. Run headed Chromium
      # on a virtual display (xvfb) so behavior matches a normal desktop browser.
      - name: Run Naukri update script
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          xvfb-run -a --server-args="-screen 0 1920x1080x24" python naukari_bot/main.py
        env:
          PLAYWRIGHT_HEADED: "1"
          EMAIL:         ${{ secrets.NAUKRI_EMAIL }}
          PASSWORD:      ${{ secrets.NAUKRI_PASSWORD }}
          SMTP_EMAIL:    ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SERVER:   ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          TO_EMAIL:      ${{ secrets.TO_EMAIL }}

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-debug
          path: artifacts/**
